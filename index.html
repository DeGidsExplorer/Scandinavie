<!DOCTYPE html>
<html lang="nl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reisplanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>

    <main class="hero">

            <span class="tag">✈️ Reisbestemmingen</span>

            <h1>Ontdek het Noorden</h1>

            <p>
                Kies een bestemming en begin je avontuur.
                Voor nu is Lapland beschikbaar.
            </p>

            <nav class="menu">
                <a href="./lapland" class="destination-card">
                    <div class="icon">❄️</div>

                    <div class="content">
                        <h2>Lapland</h2>
                        <p>Sneeuw, noorderlicht en onvergetelijke avonturen.</p>
                    </div>

                    <div class="arrow">→</div>
                </a>
            </nav>
        </div>
    </main>

    <script src="script.js"></script>

</html>
